name: Email Notification

on:
  workflow_run:
    workflows: [ "JMeter Performance Tests" ]
    types: [ completed ]

jobs:
  notify-email:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Workflow Run Results
        id: results
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              run_id: context.payload.workflow_run.id
            });

            core.setOutput('run_number',  run.data.run_number);
            core.setOutput('run_url',     run.data.html_url);
            core.setOutput('conclusion',  run.data.conclusion);
            core.setOutput('branch',      run.data.head_branch);
            core.setOutput('actor',       run.data.triggering_actor?.login || 'unknown');
            core.setOutput('commit_msg',  run.data.head_commit?.message?.split('\n')[0] || '');
            core.setOutput('commit_sha',  run.data.head_sha?.substring(0, 7) || '');
            core.setOutput('run_date',    new Date().toUTCString());

      - name: Build and Send HTML Email
        env:
          GMAIL_USERNAME:    ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
          CONCLUSION:        ${{ steps.results.outputs.conclusion }}
          RUN_NUMBER:        ${{ steps.results.outputs.run_number }}
          RUN_URL:           ${{ steps.results.outputs.run_url }}
          BRANCH:            ${{ steps.results.outputs.branch }}
          ACTOR:             ${{ steps.results.outputs.actor }}
          COMMIT_MSG:        ${{ steps.results.outputs.commit_msg }}
          COMMIT_SHA:        ${{ steps.results.outputs.commit_sha }}
          RUN_DATE:          ${{ steps.results.outputs.run_date }}
          REPO:              ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import smtplib, os, sys
          from email.mime.multipart import MIMEMultipart
          from email.mime.text       import MIMEText

          # ── Config ──────────────────────────────────────────────────────
          sender     = os.environ["GMAIL_USERNAME"]
          password   = os.environ["GMAIL_APP_PASSWORD"]
          recipient  = os.environ["NOTIFY_EMAIL"]
          conclusion = os.environ["CONCLUSION"]
          run_num    = os.environ["RUN_NUMBER"]
          run_url    = os.environ["RUN_URL"]
          branch     = os.environ["BRANCH"]
          actor      = os.environ["ACTOR"]
          commit_msg = os.environ["COMMIT_MSG"]
          commit_sha = os.environ["COMMIT_SHA"]
          run_date   = os.environ["RUN_DATE"]
          repo       = os.environ["REPO"]

          # ── Theme based on conclusion ────────────────────────────────────
          if conclusion == "success":
              header_bg     = "#1a7f37"
              badge_bg      = "#1a7f37"
              badge_text    = "&#10003;&nbsp; ALL TESTS PASSED"
              alert_bg      = "#dafbe1"
              alert_border  = "#a7f3c1"
              alert_color   = "#1a7f37"
              alert_msg     = "Baseline and medium load tests completed successfully. All SLA thresholds were met."
              subject       = f"\u2705 JMeter Performance Report \u2014 Run #{run_num} PASSED"
          elif conclusion == "failure":
              header_bg     = "#cf222e"
              badge_bg      = "#cf222e"
              badge_text    = "&#10007;&nbsp; TESTS FAILED"
              alert_bg      = "#fff1f0"
              alert_border  = "#ffc1c0"
              alert_color   = "#cf222e"
              alert_msg     = "One or more test phases did not meet SLA thresholds. Review the HTML reports for root cause analysis."
              subject       = f"\u274c JMeter Performance Report \u2014 Run #{run_num} FAILED"
          else:
              header_bg     = "#9a6700"
              badge_bg      = "#9a6700"
              badge_text    = f"&#9888;&nbsp; {conclusion.upper()}"
              alert_bg      = "#fff8c5"
              alert_border  = "#d4a72c"
              alert_color   = "#9a6700"
              alert_msg     = f"The workflow completed with status: {conclusion}. Please check the Actions tab for details."
              subject       = f"\u26a0\ufe0f JMeter Performance Report \u2014 Run #{run_num} {conclusion.upper()}"

          # ── HTML Template ────────────────────────────────────────────────
          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>JMeter Performance Report</title>
          </head>
          <body style="margin:0;padding:0;background-color:#f6f8fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:#24292f;">

            <table width="100%" cellpadding="0" cellspacing="0" style="background:#f6f8fa;padding:32px 16px;">
              <tr><td align="center">
              <table width="620" cellpadding="0" cellspacing="0" style="max-width:620px;background:#ffffff;border-radius:8px;border:1px solid #d0d7de;overflow:hidden;">

                <!-- ── HEADER ── -->
                <tr>
                  <td style="background:{header_bg};padding:28px 32px;">
                    <table width="100%" cellpadding="0" cellspacing="0">
                      <tr>
                        <td>
                          <p style="margin:0 0 4px;color:rgba(255,255,255,0.75);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;">Performance Testing Report</p>
                          <h1 style="margin:0;color:#ffffff;font-size:20px;font-weight:700;line-height:1.3;">DemoBlaze — JMeter Test Results</h1>
                        </td>
                        <td align="right" valign="top">
                          <span style="display:inline-block;background:rgba(255,255,255,0.18);color:#ffffff;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;">Run #{run_num}</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- ── OVERALL STATUS BADGE ── -->
                <tr>
                  <td style="padding:24px 32px 0;">
                    <p style="margin:0 0 10px;font-size:11px;font-weight:600;color:#57606a;text-transform:uppercase;letter-spacing:0.8px;">Overall Result</p>
                    <span style="display:inline-block;background:{badge_bg};color:#ffffff;padding:7px 20px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:0.3px;">{badge_text}</span>
                  </td>
                </tr>

                <!-- ── ALERT BOX ── -->
                <tr>
                  <td style="padding:16px 32px 0;">
                    <div style="background:{alert_bg};border:1px solid {alert_border};border-radius:6px;padding:12px 16px;">
                      <p style="margin:0;font-size:13px;color:{alert_color};line-height:1.5;">{alert_msg}</p>
                    </div>
                  </td>
                </tr>

                <!-- ── RUN METADATA ── -->
                <tr>
                  <td style="padding:20px 32px 0;">
                    <table width="100%" cellpadding="0" cellspacing="0">
                      <tr>
                        <td width="50%" style="padding-right:8px;padding-bottom:8px;">
                          <div style="background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:12px 14px;">
                            <p style="margin:0 0 3px;font-size:10px;font-weight:600;color:#57606a;text-transform:uppercase;letter-spacing:0.6px;">Repository</p>
                            <p style="margin:0;font-size:13px;font-weight:600;color:#24292f;">{repo}</p>
                          </div>
                        </td>
                        <td width="50%" style="padding-left:8px;padding-bottom:8px;">
                          <div style="background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:12px 14px;">
                            <p style="margin:0 0 3px;font-size:10px;font-weight:600;color:#57606a;text-transform:uppercase;letter-spacing:0.6px;">Branch</p>
                            <p style="margin:0;font-size:13px;font-weight:600;color:#24292f;font-family:monospace;">{branch}</p>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <td width="50%" style="padding-right:8px;">
                          <div style="background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:12px 14px;">
                            <p style="margin:0 0 3px;font-size:10px;font-weight:600;color:#57606a;text-transform:uppercase;letter-spacing:0.6px;">Triggered By</p>
                            <p style="margin:0;font-size:13px;font-weight:600;color:#24292f;">{actor}</p>
                          </div>
                        </td>
                        <td width="50%" style="padding-left:8px;">
                          <div style="background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:12px 14px;">
                            <p style="margin:0 0 3px;font-size:10px;font-weight:600;color:#57606a;text-transform:uppercase;letter-spacing:0.6px;">Commit</p>
                            <p style="margin:0;font-size:13px;font-weight:600;color:#24292f;font-family:monospace;">{commit_sha} &mdash; {commit_msg[:40]}{'...' if len(commit_msg) > 40 else ''}</p>
                          </div>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- ── RESULTS TABLE ── -->
                <tr>
                  <td style="padding:24px 32px 0;">
                    <p style="margin:0 0 12px;font-size:15px;font-weight:700;color:#24292f;">Test Phase Results</p>
                    <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #d0d7de;border-radius:6px;overflow:hidden;font-size:12px;">
                      <tr style="background:#f6f8fa;">
                        <th style="padding:10px 12px;text-align:left;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Phase</th>
                        <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Users</th>
                        <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Samples</th>
                        <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Errors</th>
                        <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Error %</th>
                        <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Avg RT</th>
                        <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Status</th>
                      </tr>

                      <!-- Baseline -->
                      <tr>
                        <td style="padding:11px 12px;color:#24292f;font-weight:600;border-bottom:1px solid #d0d7de;">Baseline</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;border-bottom:1px solid #d0d7de;">50</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;border-bottom:1px solid #d0d7de;">See report</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;border-bottom:1px solid #d0d7de;">See report</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;border-bottom:1px solid #d0d7de;">See report</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;border-bottom:1px solid #d0d7de;">See report</td>
                        <td style="padding:11px 12px;text-align:center;border-bottom:1px solid #d0d7de;">
                          <span style="background:{'#1a7f37' if conclusion == 'success' else '#cf222e'};color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;">{'PASS' if conclusion == 'success' else 'CHECK'}</span>
                        </td>
                      </tr>

                      <!-- Medium Load -->
                      <tr style="background:#f6f8fa;">
                        <td style="padding:11px 12px;color:#24292f;font-weight:600;border-bottom:1px solid #d0d7de;">Load (Medium)</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;border-bottom:1px solid #d0d7de;">150</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;border-bottom:1px solid #d0d7de;">See report</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;border-bottom:1px solid #d0d7de;">See report</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;border-bottom:1px solid #d0d7de;">See report</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;border-bottom:1px solid #d0d7de;">See report</td>
                        <td style="padding:11px 12px;text-align:center;border-bottom:1px solid #d0d7de;">
                          <span style="background:{'#1a7f37' if conclusion == 'success' else '#cf222e'};color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;">{'PASS' if conclusion == 'success' else 'CHECK'}</span>
                        </td>
                      </tr>

                      <!-- Stress Test -->
                      <tr>
                        <td style="padding:11px 12px;color:#24292f;font-weight:600;">Stress Test</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;">500</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;">See report</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;">See report</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;">See report</td>
                        <td style="padding:11px 12px;text-align:center;color:#57606a;">See report</td>
                        <td style="padding:11px 12px;text-align:center;">
                          <span style="background:#9a6700;color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;">EXPECTED</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- ── SLA REFERENCE ── -->
                <tr>
                  <td style="padding:16px 32px 0;">
                    <div style="background:#dff7e9;border:1px solid #a7f3c1;border-radius:6px;padding:11px 14px;">
                      <p style="margin:0;font-size:12px;color:#1a7f37;line-height:1.6;">
                        <strong>SLA Thresholds &nbsp;&#8212;&nbsp;</strong>
                        Average Response Time &lt; 2,000ms &nbsp;&bull;&nbsp;
                        Error Rate &lt; 1% &nbsp;&bull;&nbsp;
                        Stress test failures are expected findings
                      </p>
                    </div>
                  </td>
                </tr>

                <!-- ── CTA BUTTON ── -->
                <tr>
                  <td style="padding:24px 32px;" align="center">
                    <a href="{run_url}"
                       style="display:inline-block;background:#0969da;color:#ffffff;padding:11px 28px;border-radius:6px;text-decoration:none;font-size:14px;font-weight:600;letter-spacing:0.2px;">
                      View Full HTML Reports &rarr;
                    </a>
                  </td>
                </tr>

                <!-- ── FOOTER ── -->
                <tr>
                  <td style="background:#f6f8fa;padding:16px 32px;border-top:1px solid #d0d7de;">
                    <p style="margin:0;font-size:11px;color:#57606a;text-align:center;line-height:1.6;">
                      This report was automatically generated by GitHub Actions
                      &nbsp;&bull;&nbsp; Apache JMeter 5.6.3
                      &nbsp;&bull;&nbsp; DemoBlaze Performance Suite
                      <br>{run_date}
                    </p>
                  </td>
                </tr>

              </table>
              </td></tr>
            </table>

          </body>
          </html>"""

          # ── Send email ────────────────────────────────────────────────────
          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = f"JMeter CI <{sender}>"
          msg["To"]      = recipient
          msg.attach(MIMEText(html, "html"))

          try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
                  server.login(sender, password)
                  server.sendmail(sender, recipient, msg.as_string())
                  print(f"Email sent successfully to {recipient}")
          except smtplib.SMTPAuthenticationError:
              print("ERROR: Gmail authentication failed. Check GMAIL_USERNAME and GMAIL_APP_PASSWORD secrets.")
              sys.exit(1)
          except smtplib.SMTPException as e:
              print(f"ERROR: SMTP error — {e}")
              sys.exit(1)
          except Exception as e:
              print(f"ERROR: Unexpected error — {e}")
              sys.exit(1)
          PYEOF