name: Email Notification

on:
  workflow_call:
    inputs:
      overall_status:      { required: true, type: string }
      run_number:          { required: true, type: string }
      run_url:             { required: true, type: string }
      run_date:            { required: true, type: string }
      branch:              { required: true, type: string }
      actor:               { required: true, type: string }
      repo:                { required: true, type: string }
      baseline_samples:    { required: true, type: string }
      baseline_errors:     { required: true, type: string }
      baseline_error_pct:  { required: true, type: string }
      baseline_avg_rt:     { required: true, type: string }
      baseline_p90:        { required: true, type: string }
      baseline_status:     { required: true, type: string }
      medium_samples:      { required: true, type: string }
      medium_errors:       { required: true, type: string }
      medium_error_pct:    { required: true, type: string }
      medium_avg_rt:       { required: true, type: string }
      medium_status:       { required: true, type: string }
      peak_samples:        { required: true, type: string }
      peak_errors:         { required: true, type: string }
      peak_error_pct:      { required: true, type: string }
      peak_avg_rt:         { required: true, type: string }
      peak_status:         { required: true, type: string }
      stress_samples:      { required: true, type: string }
      stress_errors:       { required: true, type: string }
      stress_error_pct:    { required: true, type: string }
      stress_avg_rt:       { required: true, type: string }
      stress_status:       { required: true, type: string }
      endurance_samples:   { required: true, type: string }
      endurance_errors:    { required: true, type: string }
      endurance_error_pct: { required: true, type: string }
      endurance_avg_rt:    { required: true, type: string }
      endurance_status:    { required: true, type: string }
    secrets:
      GMAIL_USERNAME:     { required: true }
      GMAIL_APP_PASSWORD: { required: true }
      NOTIFY_EMAIL:       { required: true }

jobs:
  notify-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send Email Notification
        env:
          GMAIL_USERNAME:      ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
          OVERALL:             ${{ inputs.overall_status }}
          RUN_NUMBER:          ${{ inputs.run_number }}
          RUN_URL:             ${{ inputs.run_url }}
          RUN_DATE:            ${{ inputs.run_date }}
          BRANCH:              ${{ inputs.branch }}
          ACTOR:               ${{ inputs.actor }}
          REPO:                ${{ inputs.repo }}
          B_SAMPLES:           ${{ inputs.baseline_samples }}
          B_ERRORS:            ${{ inputs.baseline_errors }}
          B_ERROR_PCT:         ${{ inputs.baseline_error_pct }}
          B_AVG_RT:            ${{ inputs.baseline_avg_rt }}
          B_P90:               ${{ inputs.baseline_p90 }}
          B_STATUS:            ${{ inputs.baseline_status }}
          M_SAMPLES:           ${{ inputs.medium_samples }}
          M_ERRORS:            ${{ inputs.medium_errors }}
          M_ERROR_PCT:         ${{ inputs.medium_error_pct }}
          M_AVG_RT:            ${{ inputs.medium_avg_rt }}
          M_STATUS:            ${{ inputs.medium_status }}
          P_SAMPLES:           ${{ inputs.peak_samples }}
          P_ERRORS:            ${{ inputs.peak_errors }}
          P_ERROR_PCT:         ${{ inputs.peak_error_pct }}
          P_AVG_RT:            ${{ inputs.peak_avg_rt }}
          P_STATUS:            ${{ inputs.peak_status }}
          S_SAMPLES:           ${{ inputs.stress_samples }}
          S_ERRORS:            ${{ inputs.stress_errors }}
          S_ERROR_PCT:         ${{ inputs.stress_error_pct }}
          S_AVG_RT:            ${{ inputs.stress_avg_rt }}
          S_STATUS:            ${{ inputs.stress_status }}
          E_SAMPLES:           ${{ inputs.endurance_samples }}
          E_ERRORS:            ${{ inputs.endurance_errors }}
          E_ERROR_PCT:         ${{ inputs.endurance_error_pct }}
          E_AVG_RT:            ${{ inputs.endurance_avg_rt }}
          E_STATUS:            ${{ inputs.endurance_status }}
        run: |
          python3 << 'PYEOF'
          import smtplib, os, sys
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          sender   = os.environ.get("GMAIL_USERNAME","")
          password = os.environ.get("GMAIL_APP_PASSWORD","")
          recipient= os.environ.get("NOTIFY_EMAIL","")

          if not all([sender,password,recipient]):
              print("Email secrets not configured — skipping"); sys.exit(0)

          def g(k): return os.environ.get(k,"0")

          overall  = g("OVERALL"); run_num=g("RUN_NUMBER"); run_url=g("RUN_URL")
          run_date = g("RUN_DATE"); branch=g("BRANCH"); actor=g("ACTOR"); repo=g("REPO")

          def badge(s):
              if s=="PASS":     return '<span style="background:#1a7f37;color:#fff;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;">PASS</span>'
              if s=="EXPECTED": return '<span style="background:#9a6700;color:#fff;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;">EXPECTED</span>'
              if s=="ERROR":    return '<span style="background:#57606a;color:#fff;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;">ERROR</span>'
              return '<span style="background:#cf222e;color:#fff;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;">FAIL</span>'

          def tr(phase, users, samp, err, epct, avg, p90, status, alt=False):
              bg = "background:#f6f8fa;" if alt else ""
              bd = "border-bottom:1px solid #d0d7de;"
              return f'<tr style="{bg}"><td style="padding:11px 12px;font-weight:600;{bd}">{phase}</td><td style="padding:11px 12px;text-align:center;color:#57606a;{bd}">{users}</td><td style="padding:11px 12px;text-align:center;color:#57606a;{bd}">{samp}</td><td style="padding:11px 12px;text-align:center;color:#57606a;{bd}">{err}</td><td style="padding:11px 12px;text-align:center;color:#57606a;{bd}">{epct}%</td><td style="padding:11px 12px;text-align:center;color:#57606a;{bd}">{avg}ms</td><td style="padding:11px 12px;text-align:center;color:#57606a;{bd}">{p90}</td><td style="padding:11px 12px;text-align:center;{bd}">{badge(status)}</td></tr>'

          def tr_last(phase, users, samp, err, epct, avg, p90, status, alt=False):
              bg = "background:#f6f8fa;" if alt else ""
              return f'<tr style="{bg}"><td style="padding:11px 12px;font-weight:600;">{phase}</td><td style="padding:11px 12px;text-align:center;color:#57606a;">{users}</td><td style="padding:11px 12px;text-align:center;color:#57606a;">{samp}</td><td style="padding:11px 12px;text-align:center;color:#57606a;">{err}</td><td style="padding:11px 12px;text-align:center;color:#57606a;">{epct}%</td><td style="padding:11px 12px;text-align:center;color:#57606a;">{avg}ms</td><td style="padding:11px 12px;text-align:center;color:#57606a;">{p90}</td><td style="padding:11px 12px;text-align:center;">{badge(status)}</td></tr>'

          if overall=="PASS":
              hbg="#1a7f37"; sbg="#1a7f37"; stext="&#10003;&nbsp; ALL TESTS PASSED"
              abg="#dafbe1"; aborder="#a7f3c1"; acolor="#1a7f37"
              amsg="All five test phases completed successfully. All SLA thresholds were met."
              subject=f"\u2705 JMeter Performance Report \u2014 Run #{run_num} PASSED"
          elif overall=="FAIL":
              hbg="#cf222e"; sbg="#cf222e"; stext="&#10007;&nbsp; TESTS FAILED"
              abg="#fff1f0"; aborder="#ffc1c0"; acolor="#cf222e"
              amsg="One or more phases did not meet SLA thresholds. Review the HTML reports for root cause analysis."
              subject=f"\u274c JMeter Performance Report \u2014 Run #{run_num} FAILED"
          else:
              hbg="#9a6700"; sbg="#9a6700"; stext="&#9888;&nbsp; TESTS ERROR"
              abg="#fff8c5"; aborder="#d4a72c"; acolor="#9a6700"
              amsg="The workflow encountered an error. Check the Actions tab for details."
              subject=f"\u26a0\ufe0f JMeter Performance Report \u2014 Run #{run_num} ERROR"

          html = f"""<!DOCTYPE html><html lang="en">
          <head><meta charset="UTF-8"></head>
          <body style="margin:0;padding:0;background:#f6f8fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:#24292f;">
          <table width="100%" cellpadding="0" cellspacing="0" style="background:#f6f8fa;padding:32px 16px;">
          <tr><td align="center">
          <table width="660" cellpadding="0" cellspacing="0" style="max-width:660px;background:#fff;border-radius:8px;border:1px solid #d0d7de;overflow:hidden;">
            <tr><td style="background:{hbg};padding:28px 32px;">
              <table width="100%" cellpadding="0" cellspacing="0"><tr>
                <td><p style="margin:0 0 4px;color:rgba(255,255,255,0.75);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;">performance testing report</p>
                    <h1 style="margin:0;color:#fff;font-size:20px;font-weight:700;">DemoBlaze — JMeter test results</h1></td>
                <td align="right" valign="top"><span style="background:rgba(255,255,255,0.2);color:#fff;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;">Run #{run_num}</span></td>
              </tr></table>
            </td></tr>
            <tr><td style="padding:24px 32px 0;">
              <p style="margin:0 0 10px;font-size:11px;font-weight:600;color:#57606a;text-transform:uppercase;letter-spacing:0.8px;">overall result</p>
              <span style="display:inline-block;background:{sbg};color:#fff;padding:7px 20px;border-radius:20px;font-size:13px;font-weight:700;">{stext}</span>
            </td></tr>
            <tr><td style="padding:16px 32px 0;">
              <div style="background:{abg};border:1px solid {aborder};border-radius:6px;padding:12px 16px;">
                <p style="margin:0;font-size:13px;color:{acolor};line-height:1.5;">{amsg}</p>
              </div>
            </td></tr>
            <tr><td style="padding:20px 32px 0;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td width="50%" style="padding:0 8px 8px 0;"><div style="background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:12px 14px;">
                    <p style="margin:0 0 3px;font-size:10px;font-weight:600;color:#57606a;text-transform:uppercase;letter-spacing:0.6px;">repository</p>
                    <p style="margin:0;font-size:13px;font-weight:600;color:#24292f;">{repo}</p></div></td>
                  <td width="50%" style="padding:0 0 8px 8px;"><div style="background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:12px 14px;">
                    <p style="margin:0 0 3px;font-size:10px;font-weight:600;color:#57606a;text-transform:uppercase;letter-spacing:0.6px;">branch</p>
                    <p style="margin:0;font-size:13px;font-weight:600;color:#24292f;font-family:monospace;">{branch}</p></div></td>
                </tr>
                <tr>
                  <td width="50%" style="padding:0 8px 0 0;"><div style="background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:12px 14px;">
                    <p style="margin:0 0 3px;font-size:10px;font-weight:600;color:#57606a;text-transform:uppercase;letter-spacing:0.6px;">triggered by</p>
                    <p style="margin:0;font-size:13px;font-weight:600;color:#24292f;">{actor}</p></div></td>
                  <td width="50%" style="padding:0 0 0 8px;"><div style="background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:12px 14px;">
                    <p style="margin:0 0 3px;font-size:10px;font-weight:600;color:#57606a;text-transform:uppercase;letter-spacing:0.6px;">run date</p>
                    <p style="margin:0;font-size:13px;font-weight:600;color:#24292f;">{run_date}</p></div></td>
                </tr>
              </table>
            </td></tr>
            <tr><td style="padding:24px 32px 0;">
              <p style="margin:0 0 12px;font-size:15px;font-weight:700;color:#24292f;">Test phase results</p>
              <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #d0d7de;border-radius:6px;overflow:hidden;font-size:12px;">
                <tr style="background:#f6f8fa;">
                  <th style="padding:10px 12px;text-align:left;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Phase</th>
                  <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Users</th>
                  <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Samples</th>
                  <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Errors</th>
                  <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Error %</th>
                  <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Avg RT</th>
                  <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">P90</th>
                  <th style="padding:10px 12px;text-align:center;font-weight:600;color:#57606a;border-bottom:1px solid #d0d7de;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Status</th>
                </tr>
                {tr("Baseline",       50,  g("B_SAMPLES"),g("B_ERRORS"),g("B_ERROR_PCT"),g("B_AVG_RT"),g("B_P90")+"ms", g("B_STATUS"), False)}
                {tr("Load (medium)",  150, g("M_SAMPLES"),g("M_ERRORS"),g("M_ERROR_PCT"),g("M_AVG_RT"),"—",            g("M_STATUS"), True)}
                {tr("Peak load",      300, g("P_SAMPLES"),g("P_ERRORS"),g("P_ERROR_PCT"),g("P_AVG_RT"),"—",            g("P_STATUS"), False)}
                {tr("Stress test",    500, g("S_SAMPLES"),g("S_ERRORS"),g("S_ERROR_PCT"),g("S_AVG_RT"),"—",            g("S_STATUS"), True)}
                {tr_last("Endurance", 100, g("E_SAMPLES"),g("E_ERRORS"),g("E_ERROR_PCT"),g("E_AVG_RT"),"30 min",       g("E_STATUS"), False)}
              </table>
            </td></tr>
            <tr><td style="padding:16px 32px 0;">
              <div style="background:#dafbe1;border:1px solid #a7f3c1;border-radius:6px;padding:11px 14px;">
                <p style="margin:0;font-size:12px;color:#1a7f37;line-height:1.6;"><strong>SLA thresholds</strong> — avg response time &lt; 2,000ms &bull; error rate &lt; 1% &bull; stress test failures are expected findings</p>
              </div>
            </td></tr>
            <tr><td style="padding:24px 32px;" align="center">
              <a href="{run_url}" style="display:inline-block;background:#0969da;color:#fff;padding:11px 28px;border-radius:6px;text-decoration:none;font-size:14px;font-weight:600;">View full HTML reports &rarr;</a>
            </td></tr>
            <tr><td style="background:#f6f8fa;padding:16px 32px;border-top:1px solid #d0d7de;">
              <p style="margin:0;font-size:11px;color:#57606a;text-align:center;line-height:1.6;">Automatically generated by GitHub Actions &bull; Apache JMeter 5.6.3 &bull; DemoBlaze performance suite<br>{run_date}</p>
            </td></tr>
          </table>
          </td></tr></table></body></html>"""

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = f"JMeter CI <{sender}>"
          msg["To"]      = recipient
          msg.attach(MIMEText(html, "html"))

          try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as srv:
                  srv.login(sender, password)
                  srv.sendmail(sender, recipient, msg.as_string())
                  print(f"Email sent to {recipient}")
          except smtplib.SMTPAuthenticationError:
              print("Gmail auth failed — check GMAIL_USERNAME and GMAIL_APP_PASSWORD secrets"); sys.exit(1)
          except Exception as e:
              print(f"Email error: {e}"); sys.exit(1)
          PYEOF