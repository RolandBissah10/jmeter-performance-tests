name: JMeter Performance Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest

    outputs:
      baseline_samples:    ${{ steps.baseline.outputs.samples }}
      baseline_errors:     ${{ steps.baseline.outputs.errors }}
      baseline_error_pct:  ${{ steps.baseline.outputs.error_pct }}
      baseline_avg_rt:     ${{ steps.baseline.outputs.avg_rt }}
      baseline_p90:        ${{ steps.baseline.outputs.p90 }}
      baseline_status:     ${{ steps.baseline.outputs.status }}
      medium_samples:      ${{ steps.medium.outputs.samples }}
      medium_errors:       ${{ steps.medium.outputs.errors }}
      medium_error_pct:    ${{ steps.medium.outputs.error_pct }}
      medium_avg_rt:       ${{ steps.medium.outputs.avg_rt }}
      medium_status:       ${{ steps.medium.outputs.status }}
      peak_samples:        ${{ steps.peak.outputs.samples }}
      peak_errors:         ${{ steps.peak.outputs.errors }}
      peak_error_pct:      ${{ steps.peak.outputs.error_pct }}
      peak_avg_rt:         ${{ steps.peak.outputs.avg_rt }}
      peak_status:         ${{ steps.peak.outputs.status }}
      stress_samples:      ${{ steps.stress.outputs.samples }}
      stress_errors:       ${{ steps.stress.outputs.errors }}
      stress_error_pct:    ${{ steps.stress.outputs.error_pct }}
      stress_avg_rt:       ${{ steps.stress.outputs.avg_rt }}
      stress_status:       ${{ steps.stress.outputs.status }}
      endurance_samples:   ${{ steps.endurance.outputs.samples }}
      endurance_errors:    ${{ steps.endurance.outputs.errors }}
      endurance_error_pct: ${{ steps.endurance.outputs.error_pct }}
      endurance_avg_rt:    ${{ steps.endurance.outputs.avg_rt }}
      endurance_status:    ${{ steps.endurance.outputs.status }}
      overall_status:      ${{ steps.overall.outputs.status }}
      run_url:             ${{ steps.meta.outputs.run_url }}
      run_date:            ${{ steps.meta.outputs.run_date }}

    steps:

      # ── SETUP ────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Capture Run Metadata
        id: meta
        run: |
          echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "run_date=$(date '+%d %b %Y %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Download and Extract JMeter 5.6.3
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$(pwd)/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Verify JMeter Installation
        run: jmeter --version

      - name: Create Reports Directories
        run: |
          mkdir -p reports/baseline/html
          mkdir -p reports/medium/html
          mkdir -p reports/peak/html
          mkdir -p reports/stress/html
          mkdir -p reports/endurance/html

      - name: Clean All Previous Results
        run: |
          for phase in baseline medium peak stress endurance; do
            rm -f reports/$phase/results.jtl
            rm -rf reports/$phase/html
            mkdir -p reports/$phase/html
          done
          echo "All previous results cleared."

      - name: Verify JMX File Exists
        run: |
          if [ ! -f "Demoblaze_Performance_Test.jmx" ]; then
            echo "ERROR: JMX file not found. Files in repo root:"
            ls -la
            exit 1
          fi
          echo "JMX file confirmed: Demoblaze_Performance_Test.jmx"

      # ── HELPER FUNCTION ──────────────────────────────────────────────
      - name: Write Parse Script
        run: |
          cat > parse_jtl.py << 'PYEOF'
          import csv, os, sys

          filepath = sys.argv[1]
          is_stress = len(sys.argv) > 2 and sys.argv[2] == "stress"
          output   = os.environ.get("GITHUB_OUTPUT", "/dev/stdout")

          def write(k, v):
              with open(output, "a") as f:
                  f.write(f"{k}={v}\n")

          if not os.path.exists(filepath):
              [write(k,v) for k,v in [("samples",0),("errors",0),("error_pct",0),("avg_rt",0),("p90",0),("status","ERROR")]]
              print(f"No results file found at {filepath}")
              sys.exit(0)

          rows = list(csv.DictReader(open(filepath, encoding="utf-8", errors="replace")))
          samples   = len(rows)
          if samples == 0:
              [write(k,v) for k,v in [("samples",0),("errors",0),("error_pct",0),("avg_rt",0),("p90",0),("status","ERROR")]]
              sys.exit(0)

          errors    = sum(1 for r in rows if r.get("success","true").strip().lower() == "false")
          error_pct = round(errors * 100 / samples, 2)
          times     = [int(r["elapsed"]) for r in rows if r.get("elapsed","").isdigit()]
          avg_rt    = round(sum(times) / len(times)) if times else 0
          p90       = sorted(times)[int(len(times) * 0.9)] if times else 0

          if is_stress:
              status = "EXPECTED" if error_pct >= 1 or avg_rt >= 2000 else "PASS"
          else:
              status = "PASS" if error_pct < 1 and avg_rt < 2000 else "FAIL"

          [write(k,v) for k,v in [("samples",samples),("errors",errors),("error_pct",error_pct),("avg_rt",avg_rt),("p90",p90),("status",status)]]
          print(f"  Samples: {samples} | Errors: {errors} ({error_pct}%) | Avg RT: {avg_rt}ms | P90: {p90}ms | {status}")
          PYEOF

      # ── BASELINE TEST ── TG1: 50 Users ───────────────────────────────
      - name: "Run Baseline Test — TG1 (50 Users)"
        run: |
          jmeter -n \
            -t Demoblaze_Performance_Test.jmx \
            -l reports/baseline/results.jtl \
            -e -o reports/baseline/html \
            -Jjmeter.save.saveservice.output_format=csv \
            -Jjmeter.save.saveservice.print_field_names=true
        continue-on-error: true

      - name: Parse Baseline Results
        id: baseline
        run: python3 parse_jtl.py reports/baseline/results.jtl

      # ── MEDIUM LOAD TEST ── TG2: 150 Users ───────────────────────────
      - name: "Switch to TG2 — Medium Load (150 Users)"
        run: |
          sed -i 's/testname="TG1 - Light Load (50 Users - Baseline)" enabled="true"/testname="TG1 - Light Load (50 Users - Baseline)" enabled="false"/' Demoblaze_Performance_Test.jmx
          sed -i 's/testname="TG2 - Medium Load (150 Users)" enabled="false"/testname="TG2 - Medium Load (150 Users)" enabled="true"/' Demoblaze_Performance_Test.jmx
          echo "Active thread group: TG2 - Medium Load (150 Users)"

      - name: "Run Medium Load Test — TG2 (150 Users)"
        run: |
          rm -f reports/medium/results.jtl
          rm -rf reports/medium/html && mkdir -p reports/medium/html
          jmeter -n \
            -t Demoblaze_Performance_Test.jmx \
            -l reports/medium/results.jtl \
            -e -o reports/medium/html \
            -Jjmeter.save.saveservice.output_format=csv \
            -Jjmeter.save.saveservice.print_field_names=true
        continue-on-error: true

      - name: Parse Medium Results
        id: medium
        run: python3 parse_jtl.py reports/medium/results.jtl

      # ── PEAK LOAD TEST ── TG3: 300 Users ─────────────────────────────
      - name: "Switch to TG3 — Peak Load (300 Users)"
        run: |
          sed -i 's/testname="TG2 - Medium Load (150 Users)" enabled="true"/testname="TG2 - Medium Load (150 Users)" enabled="false"/' Demoblaze_Performance_Test.jmx
          sed -i 's/testname="TG3 - Peak Load (300 Users)" enabled="false"/testname="TG3 - Peak Load (300 Users)" enabled="true"/' Demoblaze_Performance_Test.jmx
          echo "Active thread group: TG3 - Peak Load (300 Users)"

      - name: "Run Peak Load Test — TG3 (300 Users)"
        run: |
          rm -f reports/peak/results.jtl
          rm -rf reports/peak/html && mkdir -p reports/peak/html
          jmeter -n \
            -t Demoblaze_Performance_Test.jmx \
            -l reports/peak/results.jtl \
            -e -o reports/peak/html \
            -Jjmeter.save.saveservice.output_format=csv \
            -Jjmeter.save.saveservice.print_field_names=true
        continue-on-error: true

      - name: Parse Peak Results
        id: peak
        run: python3 parse_jtl.py reports/peak/results.jtl

      # ── STRESS TEST ── TG4: 500 Users ────────────────────────────────
      - name: "Switch to TG4 — Stress Test (500 Users)"
        run: |
          sed -i 's/testname="TG3 - Peak Load (300 Users)" enabled="true"/testname="TG3 - Peak Load (300 Users)" enabled="false"/' Demoblaze_Performance_Test.jmx
          sed -i 's/testname="TG4 - Stress Test (500 Users)" enabled="false"/testname="TG4 - Stress Test (500 Users)" enabled="true"/' Demoblaze_Performance_Test.jmx
          echo "Active thread group: TG4 - Stress Test (500 Users)"

      - name: "Run Stress Test — TG4 (500 Users)"
        run: |
          rm -f reports/stress/results.jtl
          rm -rf reports/stress/html && mkdir -p reports/stress/html
          jmeter -n \
            -t Demoblaze_Performance_Test.jmx \
            -l reports/stress/results.jtl \
            -e -o reports/stress/html \
            -Jjmeter.save.saveservice.output_format=csv \
            -Jjmeter.save.saveservice.print_field_names=true
        continue-on-error: true

      - name: Parse Stress Results
        id: stress
        run: python3 parse_jtl.py reports/stress/results.jtl stress

      # ── ENDURANCE TEST ── TG5: 100 Users / 30 min ────────────────────
      - name: "Switch to TG5 — Endurance Test (100 Users / 30 min)"
        run: |
          sed -i 's/testname="TG4 - Stress Test (500 Users)" enabled="true"/testname="TG4 - Stress Test (500 Users)" enabled="false"/' Demoblaze_Performance_Test.jmx
          sed -i 's/testname="TG5 - Endurance Test (100 Users \/ 30 min)" enabled="false"/testname="TG5 - Endurance Test (100 Users \/ 30 min)" enabled="true"/' Demoblaze_Performance_Test.jmx
          echo "Active thread group: TG5 - Endurance Test (100 Users / 30 min)"

      - name: "Run Endurance Test — TG5 (100 Users / 30 min)"
        run: |
          rm -f reports/endurance/results.jtl
          rm -rf reports/endurance/html && mkdir -p reports/endurance/html
          jmeter -n \
            -t Demoblaze_Performance_Test.jmx \
            -l reports/endurance/results.jtl \
            -e -o reports/endurance/html \
            -Jjmeter.save.saveservice.output_format=csv \
            -Jjmeter.save.saveservice.print_field_names=true
        continue-on-error: true

      - name: Parse Endurance Results
        id: endurance
        run: python3 parse_jtl.py reports/endurance/results.jtl

      # ── OVERALL STATUS ───────────────────────────────────────────────
      - name: Determine Overall Status
        id: overall
        if: always()
        run: |
          B="${{ steps.baseline.outputs.status }}"
          M="${{ steps.medium.outputs.status }}"
          P="${{ steps.peak.outputs.status }}"
          E="${{ steps.endurance.outputs.status }}"
          if [ "$B" = "ERROR" ] || [ "$M" = "ERROR" ] || [ "$P" = "ERROR" ] || [ "$E" = "ERROR" ]; then
            echo "status=ERROR" >> $GITHUB_OUTPUT
          elif [ "$B" = "PASS" ] && [ "$M" = "PASS" ] && [ "$P" = "PASS" ] && [ "$E" = "PASS" ]; then
            echo "status=PASS"  >> $GITHUB_OUTPUT
          else
            echo "status=FAIL"  >> $GITHUB_OUTPUT
          fi

      # ── UPLOAD ARTIFACTS ─────────────────────────────────────────────
      - name: Upload All HTML Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-html-reports-run-${{ github.run_number }}
          path: reports/
          retention-days: 14

      - name: Upload All JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-jtl-results-run-${{ github.run_number }}
          path: |
            reports/baseline/results.jtl
            reports/medium/results.jtl
            reports/peak/results.jtl
            reports/stress/results.jtl
            reports/endurance/results.jtl
          retention-days: 14

      # ── CONSOLE SUMMARY ──────────────────────────────────────────────
      - name: Print Test Summary
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║         DEMOBLAZE PERFORMANCE TEST SUMMARY             ║"
          echo "╠════════════════════════════════════════════════════════╣"
          echo "  Run #${{ github.run_number }} | Branch: ${{ github.ref_name }} | Actor: ${{ github.actor }}"
          echo "╠════════════════════════════════════════════════════════╣"
          echo "  TG1 Baseline  (50)   → ${{ steps.baseline.outputs.samples }} samples | ${{ steps.baseline.outputs.errors }} errors (${{ steps.baseline.outputs.error_pct }}%) | ${{ steps.baseline.outputs.avg_rt }}ms avg | ${{ steps.baseline.outputs.status }}"
          echo "  TG2 Medium   (150)   → ${{ steps.medium.outputs.samples }} samples | ${{ steps.medium.outputs.errors }} errors (${{ steps.medium.outputs.error_pct }}%) | ${{ steps.medium.outputs.avg_rt }}ms avg | ${{ steps.medium.outputs.status }}"
          echo "  TG3 Peak     (300)   → ${{ steps.peak.outputs.samples }} samples | ${{ steps.peak.outputs.errors }} errors (${{ steps.peak.outputs.error_pct }}%) | ${{ steps.peak.outputs.avg_rt }}ms avg | ${{ steps.peak.outputs.status }}"
          echo "  TG4 Stress   (500)   → ${{ steps.stress.outputs.samples }} samples | ${{ steps.stress.outputs.errors }} errors (${{ steps.stress.outputs.error_pct }}%) | ${{ steps.stress.outputs.avg_rt }}ms avg | ${{ steps.stress.outputs.status }}"
          echo "  TG5 Endurance(100)   → ${{ steps.endurance.outputs.samples }} samples | ${{ steps.endurance.outputs.errors }} errors (${{ steps.endurance.outputs.error_pct }}%) | ${{ steps.endurance.outputs.avg_rt }}ms avg | ${{ steps.endurance.outputs.status }}"
          echo "╠════════════════════════════════════════════════════════╣"
          echo "  OVERALL: ${{ steps.overall.outputs.status }}"
          echo "╚════════════════════════════════════════════════════════╝"

  # ── CALL SLACK NOTIFICATION WORKFLOW ─────────────────────────────────
  slack:
    needs: performance-test
    if: always()
    uses: ./.github/workflows/slack_notification.yml
    with:
      overall_status:      ${{ needs.performance-test.outputs.overall_status }}
      run_number:          ${{ github.run_number }}
      run_url:             ${{ needs.performance-test.outputs.run_url }}
      branch:              ${{ github.ref_name }}
      actor:               ${{ github.actor }}
      repo:                ${{ github.repository }}
      baseline_samples:    ${{ needs.performance-test.outputs.baseline_samples }}
      baseline_errors:     ${{ needs.performance-test.outputs.baseline_errors }}
      baseline_error_pct:  ${{ needs.performance-test.outputs.baseline_error_pct }}
      baseline_avg_rt:     ${{ needs.performance-test.outputs.baseline_avg_rt }}
      baseline_p90:        ${{ needs.performance-test.outputs.baseline_p90 }}
      baseline_status:     ${{ needs.performance-test.outputs.baseline_status }}
      medium_samples:      ${{ needs.performance-test.outputs.medium_samples }}
      medium_errors:       ${{ needs.performance-test.outputs.medium_errors }}
      medium_error_pct:    ${{ needs.performance-test.outputs.medium_error_pct }}
      medium_avg_rt:       ${{ needs.performance-test.outputs.medium_avg_rt }}
      medium_status:       ${{ needs.performance-test.outputs.medium_status }}
      peak_samples:        ${{ needs.performance-test.outputs.peak_samples }}
      peak_errors:         ${{ needs.performance-test.outputs.peak_errors }}
      peak_error_pct:      ${{ needs.performance-test.outputs.peak_error_pct }}
      peak_avg_rt:         ${{ needs.performance-test.outputs.peak_avg_rt }}
      peak_status:         ${{ needs.performance-test.outputs.peak_status }}
      stress_samples:      ${{ needs.performance-test.outputs.stress_samples }}
      stress_errors:       ${{ needs.performance-test.outputs.stress_errors }}
      stress_error_pct:    ${{ needs.performance-test.outputs.stress_error_pct }}
      stress_avg_rt:       ${{ needs.performance-test.outputs.stress_avg_rt }}
      stress_status:       ${{ needs.performance-test.outputs.stress_status }}
      endurance_samples:   ${{ needs.performance-test.outputs.endurance_samples }}
      endurance_errors:    ${{ needs.performance-test.outputs.endurance_errors }}
      endurance_error_pct: ${{ needs.performance-test.outputs.endurance_error_pct }}
      endurance_avg_rt:    ${{ needs.performance-test.outputs.endurance_avg_rt }}
      endurance_status:    ${{ needs.performance-test.outputs.endurance_status }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── CALL EMAIL NOTIFICATION WORKFLOW ─────────────────────────────────
  email:
    needs: performance-test
    if: always()
    uses: ./.github/workflows/email_notification.yml
    with:
      overall_status:      ${{ needs.performance-test.outputs.overall_status }}
      run_number:          ${{ github.run_number }}
      run_url:             ${{ needs.performance-test.outputs.run_url }}
      run_date:            ${{ needs.performance-test.outputs.run_date }}
      branch:              ${{ github.ref_name }}
      actor:               ${{ github.actor }}
      repo:                ${{ github.repository }}
      baseline_samples:    ${{ needs.performance-test.outputs.baseline_samples }}
      baseline_errors:     ${{ needs.performance-test.outputs.baseline_errors }}
      baseline_error_pct:  ${{ needs.performance-test.outputs.baseline_error_pct }}
      baseline_avg_rt:     ${{ needs.performance-test.outputs.baseline_avg_rt }}
      baseline_p90:        ${{ needs.performance-test.outputs.baseline_p90 }}
      baseline_status:     ${{ needs.performance-test.outputs.baseline_status }}
      medium_samples:      ${{ needs.performance-test.outputs.medium_samples }}
      medium_errors:       ${{ needs.performance-test.outputs.medium_errors }}
      medium_error_pct:    ${{ needs.performance-test.outputs.medium_error_pct }}
      medium_avg_rt:       ${{ needs.performance-test.outputs.medium_avg_rt }}
      medium_status:       ${{ needs.performance-test.outputs.medium_status }}
      peak_samples:        ${{ needs.performance-test.outputs.peak_samples }}
      peak_errors:         ${{ needs.performance-test.outputs.peak_errors }}
      peak_error_pct:      ${{ needs.performance-test.outputs.peak_error_pct }}
      peak_avg_rt:         ${{ needs.performance-test.outputs.peak_avg_rt }}
      peak_status:         ${{ needs.performance-test.outputs.peak_status }}
      stress_samples:      ${{ needs.performance-test.outputs.stress_samples }}
      stress_errors:       ${{ needs.performance-test.outputs.stress_errors }}
      stress_error_pct:    ${{ needs.performance-test.outputs.stress_error_pct }}
      stress_avg_rt:       ${{ needs.performance-test.outputs.stress_avg_rt }}
      stress_status:       ${{ needs.performance-test.outputs.stress_status }}
      endurance_samples:   ${{ needs.performance-test.outputs.endurance_samples }}
      endurance_errors:    ${{ needs.performance-test.outputs.endurance_errors }}
      endurance_error_pct: ${{ needs.performance-test.outputs.endurance_error_pct }}
      endurance_avg_rt:    ${{ needs.performance-test.outputs.endurance_avg_rt }}
      endurance_status:    ${{ needs.performance-test.outputs.endurance_status }}
    secrets:
      GMAIL_USERNAME:     ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}