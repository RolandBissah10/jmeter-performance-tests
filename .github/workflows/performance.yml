name: JMeter Performance Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download Apache JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "JMeter downloaded and extracted"

      - name: Create reports directories
        run: |
          mkdir -p reports/baseline/html
          mkdir -p reports/medium/html
          mkdir -p reports/stress/html
          mkdir -p reports/endurance/html

      - name: Run Baseline Test (50 users)
        run: |
          apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t Demoblaze_Performance_Test.jmx \
            -l reports/baseline/results.jtl \
            -e -o reports/baseline/html \
            -Jjmeter.save.saveservice.output_format=csv
        continue-on-error: true

      - name: Upload Baseline HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: baseline-html-report
          path: reports/baseline/html/
          retention-days: 7
        if: always()

      - name: Upload Baseline JTL Results
        uses: actions/upload-artifact@v4
        with:
          name: baseline-jtl-results
          path: reports/baseline/results.jtl
          retention-days: 7
        if: always()

      - name: Print Test Summary
        run: |
          echo "=============================="
          echo "PERFORMANCE TEST SUMMARY"
          echo "=============================="
          if [ -f reports/baseline/results.jtl ]; then
            echo "Baseline results file: FOUND"
            echo "Total lines in results: $(wc -l < reports/baseline/results.jtl)"
          else
            echo "Baseline results file: NOT FOUND"
          fi
          echo "=============================="
        if: always()
